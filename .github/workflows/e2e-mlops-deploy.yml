# =============================================================================
# E2E MLOps Model Deploy (Manual)
# =============================================================================
# Manual single-stage (or all-stages) deploy of the latest Approved model.
# Drives the same `deploy_pipeline` DAG used by the promote workflow but
# without manual approval gates, smoke tests, or log capture.
#
# Use this for ad-hoc redeploys / debugging. Event-driven promotion (kicked
# off by SageMaker model approval) lives in `e2e-mlops-promote.yml`, which
# owns the `repository_dispatch: [model-approved]` trigger.
# =============================================================================

name: E2E MLOps Model Deploy (Manual)

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Target deployment stage"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod, all]
      model_package_arn:
        description: "Override model package ARN (default: latest Approved)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # Resolve the requested stage(s) once so the deploy job can fan out via matrix.
  resolve:
    name: Resolve target stages
    runs-on: ubuntu-latest
    outputs:
      stages: ${{ steps.set.outputs.stages }}
      model_package_arn: ${{ steps.set.outputs.model_package_arn }}
      model_package_group: ${{ steps.set.outputs.model_package_group }}
    steps:
      - id: set
        shell: bash
        run: |
          STAGE="${{ inputs.stage }}"
          STAGE="${STAGE:-dev}"

          if [ "$STAGE" = "all" ]; then
            echo 'stages=["dev","test","prod"]' >> $GITHUB_OUTPUT
          else
            echo "stages=[\"$STAGE\"]" >> $GITHUB_OUTPUT
          fi

          # Sentinel "none" lets the SMUS CLI manifest validator pass when no
          # model-package override is supplied.
          ARN="${{ inputs.model_package_arn }}"
          echo "model_package_arn=${ARN:-none}" >> $GITHUB_OUTPUT
          echo "model_package_group=bank-mktg-prediction-models" >> $GITHUB_OUTPUT

  deploy-model:
    name: Deploy Approved Model (${{ matrix.stage }})
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        stage: ${{ fromJSON(needs.resolve.outputs.stages) }}
    environment: ${{ matrix.stage }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SMUS CI/CD CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: smus-e2e-mlops-deploy

      - name: Set manifest substitution env
        # SMUS CLI rejects unresolved substitutions in the manifest. Set sentinels
        # for the model-promotion vars and expose GIT_COMMIT so the manifest can
        # pin to the dispatching commit.
        run: |
          {
            echo "GIT_COMMIT=${{ github.sha }}"
            echo "MODEL_PACKAGE_ARN=${{ needs.resolve.outputs.model_package_arn }}"
            echo "MODEL_PACKAGE_GROUP=${{ needs.resolve.outputs.model_package_group }}"
            echo "MODEL_DATA_URL_OVERRIDE=none"
          } >> $GITHUB_ENV

      - name: Deploy approved model to ${{ matrix.stage }}
        env:
          DOMAIN_REGION: ${{ vars.AWS_REGION }}
          DEV_DOMAIN_REGION: ${{ vars.AWS_REGION }}
          TEST_DOMAIN_REGION: ${{ vars.AWS_REGION }}
          PROD_DOMAIN_REGION: ${{ vars.AWS_REGION }}
        shell: bash
        run: |
          MANIFEST="examples/end-to-end-data-ml-pipeline/examples/mlops-pipeline/manifest.yaml"
          STAGE="${{ matrix.stage }}"
          STAGE_START=$(date +%s)

          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  MLOps Model Deploy (Manual)"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Stage              : ${STAGE}"
          echo "║  Model Package ARN  : ${MODEL_PACKAGE_ARN}"
          echo "║  Model Package Group: ${MODEL_PACKAGE_GROUP}"
          echo "║  Triggered by       : ${{ github.actor }}"
          echo "║  Run ID             : ${{ github.run_id }}"
          echo "║  Commit             : ${GIT_COMMIT}"
          echo "╚══════════════════════════════════════════════════════════╝"

          echo "::group::🔍 Validating target ${STAGE}"
          aws-smus-cicd-cli describe \
            --manifest "$MANIFEST" \
            --targets "$STAGE" \
            --connect
          echo "::endgroup::"

          echo "::group::🚀 Triggering deploy_pipeline for ${STAGE}"
          aws-smus-cicd-cli run \
            --manifest "$MANIFEST" \
            --targets "$STAGE" \
            --workflow deploy_pipeline
          echo "::endgroup::"

          echo "::group::📡 Monitoring deploy_pipeline for ${STAGE}"
          aws-smus-cicd-cli monitor \
            --manifest "$MANIFEST" \
            --targets "$STAGE"
          echo "::endgroup::"

          STAGE_END=$(date +%s)
          STAGE_DURATION=$((STAGE_END - STAGE_START))
          echo "✅ ${STAGE} deployment complete (${STAGE_DURATION}s)"

# =============================================================================
# DataOps Pipeline - Environment Configuration (reference)
# =============================================================================
# Reference values per stage, mirroring the GitHub repo/environment variables
# the deploy workflows use. Use these as the source when exporting variables
# for local runs.
#
# Variable mapping (YAML key → env var):
#   dev.domain_name → DEV_DOMAIN_NAME
#   dev.region      → DEV_DOMAIN_REGION
#   dev.project_name → DEV_PROJECT_NAME
#   dev.deployment_role → PROJECT_ROLE
#   dev.account_id  → AWS_ACCOUNT_ID
# =============================================================================

dev:
  domain_name: Default_02202026_Domain
  region: us-east-1
  project_name: ml-dev
  deployment_role: Admin-SMUSCLI
  account_id: "688930149168"


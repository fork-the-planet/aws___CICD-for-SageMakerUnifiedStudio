# =============================================================================
# Connectivity Test - Validate OIDC + AWS Access Across All Accounts
# =============================================================================
# Verifies GitHub OIDC authentication and AWS connectivity for each
# environment before running actual deployments.
#
# Triggers:
#   - Manual dispatch (select specific environment or test all)
# =============================================================================

name: Connectivity Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to test"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  # ── Dev Connectivity ──────────────────────────────────────────────────────
  dev-connectivity:
    name: Dev Connectivity
    if: inputs.environment == 'all' || inputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Verify AWS identity
        run: |
          echo "=== AWS Identity ==="
          aws sts get-caller-identity
          echo ""
          echo "=== Account Check ==="
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "Connected to account: $ACCOUNT"
          EXPECTED="${{ vars.AWS_ACCOUNT_ID }}"
          if [ -n "$EXPECTED" ] && [ "$ACCOUNT" != "$EXPECTED" ]; then
            echo "ERROR: Expected account $EXPECTED, got $ACCOUNT"
            exit 1
          fi
          echo "✅ Dev account verified: $ACCOUNT"

      - name: Test S3 access
        run: |
          echo "=== S3 Bucket List (first 5) ==="
          aws s3 ls | head -5 || echo "⚠️  No S3 buckets or limited permissions"

      - name: Test SageMaker access
        run: |
          echo "=== SageMaker Domains ==="
          aws sagemaker list-domains --query 'Domains[].DomainName' --output table || echo "⚠️  No SageMaker domains or limited permissions"

      - name: Test aws-smus-cicd-cli
        run: |
          pip install aws-smus-cicd-cli -q
          aws-smus-cicd-cli --help

  # ── Test Connectivity ─────────────────────────────────────────────────────
  test-connectivity:
    name: Test Connectivity
    if: inputs.environment == 'all' || inputs.environment == 'test'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Verify AWS identity
        run: |
          echo "=== AWS Identity ==="
          aws sts get-caller-identity
          echo ""
          echo "=== Account Check ==="
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "Connected to account: $ACCOUNT"
          EXPECTED="${{ vars.AWS_ACCOUNT_ID }}"
          if [ -n "$EXPECTED" ] && [ "$ACCOUNT" != "$EXPECTED" ]; then
            echo "ERROR: Expected account $EXPECTED, got $ACCOUNT"
            exit 1
          fi
          echo "✅ Test account verified: $ACCOUNT"

      - name: Test S3 access
        run: |
          echo "=== S3 Bucket List (first 5) ==="
          aws s3 ls | head -5 || echo "⚠️  No S3 buckets or limited permissions"

      - name: Test aws-smus-cicd-cli
        run: |
          pip install aws-smus-cicd-cli -q
          aws-smus-cicd-cli --help

  # ── Prod Connectivity ─────────────────────────────────────────────────────
  prod-connectivity:
    name: Prod Connectivity
    if: inputs.environment == 'all' || inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Verify AWS identity
        run: |
          echo "=== AWS Identity ==="
          aws sts get-caller-identity
          echo ""
          echo "=== Account Check ==="
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "Connected to account: $ACCOUNT"
          EXPECTED="${{ vars.AWS_ACCOUNT_ID }}"
          if [ -n "$EXPECTED" ] && [ "$ACCOUNT" != "$EXPECTED" ]; then
            echo "ERROR: Expected account $EXPECTED, got $ACCOUNT"
            exit 1
          fi
          echo "✅ Prod account verified: $ACCOUNT"

      - name: Test S3 access
        run: |
          echo "=== S3 Bucket List (first 5) ==="
          aws s3 ls | head -5 || echo "⚠️  No S3 buckets or limited permissions"

      - name: Test aws-smus-cicd-cli
        run: |
          pip install aws-smus-cicd-cli -q
          aws-smus-cicd-cli --help

  # ── Summary ──────────────────────────────────────────────────────────────
  summary:
    name: Summary
    needs: [dev-connectivity, test-connectivity, prod-connectivity]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Results
        run: |
          echo "=== Connectivity Test Results ==="
          echo "Dev:  ${{ needs.dev-connectivity.result || 'skipped' }}"
          echo "Test: ${{ needs.test-connectivity.result || 'skipped' }}"
          echo "Prod: ${{ needs.prod-connectivity.result || 'skipped' }}"
          if [ "${{ needs.dev-connectivity.result }}" == "failure" ] || \
             [ "${{ needs.test-connectivity.result }}" == "failure" ] || \
             [ "${{ needs.prod-connectivity.result }}" == "failure" ]; then
            echo "❌ One or more connectivity tests failed"
            exit 1
          fi
          echo "✅ All tested environments passed"

# =============================================================================
# MLOps CI/CD Pipeline - Bank Mktg Prediction (Notebook-Based)
# =============================================================================
# Deploys the ML training pipeline across dev > test > prod using aws-smus-cicd-cli.
# Uses OIDC to authenticate, then assumes a DataZone project role for deploy.
#
# Required GitHub secrets (per environment):
#   AWS_ROLE_ARN      - OIDC role (GitHubActionsRole-<env>)
# =============================================================================

name: Bank Mktg MLOps Pipeline

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target stage"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod, all]
      setup_mlflow:
        description: "Setup MLOps infrastructure (MLflow server + deploy trigger)"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'all' && 'prod' || inputs.target }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve target stages
        id: stages
        shell: bash
        run: |
          if [ "${{ inputs.target }}" = "all" ]; then
            echo "list=dev test prod" >> $GITHUB_OUTPUT
          else
            echo "list=${{ inputs.target }}" >> $GITHUB_OUTPUT
          fi

      - name: Install CLI
        run: pip install aws-smus-cicd-cli pyyaml -q

      - name: Load environment config
        run: python3 scripts/load_env.py mlops

      - name: Package training script
        working-directory: examples/mlops-pipeline/src
        run: tar -czf sourcedir.tar.gz train_xgboost.py requirements.txt

      - name: Deploy to target stages
        shell: bash
        working-directory: examples/mlops-pipeline
        env:
          OIDC_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          OIDC_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          OIDC_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        run: |
          STAGES="${{ steps.stages.outputs.list }}"
          TOTAL=$(echo $STAGES | wc -w | tr -d ' ')
          CURRENT=0
          START_TIME=$(date +%s)

          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  MLOps Pipeline (Notebook) - Deployment                 ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Target stages : $STAGES"
          echo "║  MLflow setup  : ${{ inputs.setup_mlflow }}"
          echo "║  Triggered by  : ${{ github.actor }}"
          echo "║  Run ID        : ${{ github.run_id }}"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

          for STAGE in $STAGES; do
            CURRENT=$((CURRENT + 1))
            STAGE_START=$(date +%s)

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 [$CURRENT/$TOTAL] Deploying to ${STAGE}..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Restore OIDC credentials
            export AWS_ACCESS_KEY_ID="$OIDC_ACCESS_KEY_ID"
            export AWS_SECRET_ACCESS_KEY="$OIDC_SECRET_ACCESS_KEY"
            export AWS_SESSION_TOKEN="$OIDC_SESSION_TOKEN"

            # Assume project role
            echo "::group::🔐 Assuming project role for ${STAGE}"
            CREDS=$(aws sts assume-role \
              --role-arn "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.DEPLOYMENT_ROLE_NAME }}" \
              --role-session-name "deploy-${STAGE}" \
              --query 'Credentials' --output json)
            export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r .AccessKeyId)
            export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r .SecretAccessKey)
            export AWS_SESSION_TOKEN=$(echo $CREDS | jq -r .SessionToken)
            echo "::endgroup::"

            # Optional MLflow + deploy trigger setup
            if [ "${{ inputs.setup_mlflow }}" = "true" ]; then
              echo "::group::🧪 Setting up MLOps infrastructure for ${STAGE}"
              bash ../../scripts/setup-mlops-infra.sh "$STAGE" "${{ vars.AWS_ACCOUNT_ID }}" "${{ vars.AWS_REGION || 'us-east-1' }}" "${{ vars.PROJECT_NAME || 'bank-mktg-'}}${STAGE}"
              echo "::endgroup::"
            fi

            # Validate and deploy
            echo "::group::🔍 Validating manifest for ${STAGE}"
            aws-smus-cicd-cli describe --manifest manifest.yaml --targets "$STAGE" --connect
            echo "::endgroup::"

            echo "::group::📦 Deploying to ${STAGE}"
            aws-smus-cicd-cli deploy --manifest manifest.yaml --targets "$STAGE"
            echo "::endgroup::"

            STAGE_END=$(date +%s)
            STAGE_DURATION=$((STAGE_END - STAGE_START))
            echo "✅ ${STAGE} deployment complete (${STAGE_DURATION}s)"
            echo ""
          done

          END_TIME=$(date +%s)
          TOTAL_DURATION=$((END_TIME - START_TIME))
          echo "✅ All deployments complete (${TOTAL_DURATION}s)"
